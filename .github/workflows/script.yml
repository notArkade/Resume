name: Build Resume

on:
  push:
    paths:
      - "resume.tex"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended poppler-utils

      - name: Compile LaTeX
        run: pdflatex resume.tex

      - name: Rename PDF
        run: mv resume.pdf Arkadip_Das-Resume.pdf

      - name: Convert PDF to PNG
        run: pdftoppm -png -singlefile Arkadip_Das-Resume.pdf resume

      - name: Commit updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add resume.png Arkadip_Das-Resume.pdf
          git commit -m "Update resume preview and PDF" || echo "No changes"
          git push